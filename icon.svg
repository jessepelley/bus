<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background tile -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>
  <!-- Wheel wells: dark cutouts so the tires sit in the body, not below it -->
  <rect x="13" y="42" width="14" height="9" rx="2" fill="#1d4ed8"/>
  <rect x="37" y="42" width="14" height="9" rx="2" fill="#1d4ed8"/>
  <!-- Bus body -->
  <rect x="11" y="11" width="42" height="34" rx="6" fill="#ffffff"/>
  <!-- Windshield band -->
  <rect x="15" y="15" width="34" height="11" rx="2" fill="#2563eb"/>
  <!-- Window divider -->
  <line x1="32" y1="15" x2="32" y2="26" stroke="#ffffff" stroke-width="1.2"/>
  <!-- Side trim -->
  <rect x="13" y="30" width="38" height="1.5" fill="#2563eb" opacity=".4"/>
  <!-- Door -->
  <rect x="31" y="31" width="2" height="12" fill="#2563eb" opacity=".4"/>
  <!-- Headlights -->
  <circle cx="16" cy="40" r="1.7" fill="#fde68a"/>
  <circle cx="48" cy="40" r="1.7" fill="#fde68a"/>
  <!-- Tires -->
  <circle cx="20" cy="48" r="5" fill="#111114"/>
  <circle cx="44" cy="48" r="5" fill="#111114"/>
  <!-- Hubs -->
  <circle cx="20" cy="48" r="1.9" fill="#cbd5e1"/>
  <circle cx="44" cy="48" r="1.9" fill="#cbd5e1"/>
</svg>
